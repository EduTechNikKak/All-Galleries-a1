<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Minimal Gallery</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #fafafa;
      -webkit-tap-highlight-color: transparent; 
      touch-action: manipulation;
    }
    .hidden-scrollbar::-webkit-scrollbar { display: none; }
    .hidden-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .animate-fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .blur-backdrop { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    input, select, textarea { font-size: 16px !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // SVG Icons
    const IconLock = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const IconUpload = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
    const IconImage = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconX = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconPlus = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconCheckCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconLoader2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>;
    const IconEdit2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
    const IconTrash2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconAlertTriangle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconDownload = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;

    // ตรวจสอบ OS สำหรับการแชร์ดาวน์โหลด
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    const GAS_URL = "https://script.google.com/macros/s/AKfycbwzkz3J85_sKApRRBRUk2JKTOn8AFnxZOi846eqL1IEjdAJkbfHUD09jtZYCO1ecV8z/exec"; 
    const ADMIN_PASSWORD = "nik12345";

    function App() {
      const [images, setImages] = useState([]);
      const [tabs, setTabs] = useState(['All']);
      const [isLoading, setIsLoading] = useState(true);
      const [view, setView] = useState('gallery');
      
      const [activeTab, setActiveTab] = useState('All');
      const [selectedImage, setSelectedImage] = useState(null);

      // Download Mode State
      const [isDownloadMode, setIsDownloadMode] = useState(false);
      const [selectedDownloadIds, setSelectedDownloadIds] = useState([]);
      const [isDownloading, setIsDownloading] = useState(false);
      const [downloadProgress, setDownloadProgress] = useState({ current: 0, total: 0, status: '' });

      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authPassword, setAuthPassword] = useState('');
      const [authError, setAuthError] = useState('');

      const fileInputRef = useRef(null);
      const [stagedFiles, setStagedFiles] = useState([]);
      const [isUploading, setIsUploading] = useState(false);
      
      const [uploadQuality, setUploadQuality] = useState('web');
      const [globalTab, setGlobalTab] = useState('General');
      const [isGlobalNewTab, setIsGlobalNewTab] = useState(false);
      const [globalNewTabName, setGlobalNewTabName] = useState('');

      const [toastMessage, setToastMessage] = useState(null);
      const [toastType, setToastType] = useState('success');

      const [adminTab, setAdminTab] = useState('All');
      const [selectedIds, setSelectedIds] = useState([]);
      const [itemToEdit, setItemToEdit] = useState(null);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);

      const showToast = (message, type = 'success') => {
        setToastMessage(message);
        setToastType(type);
        setTimeout(() => setToastMessage(null), 3000);
      };

      const apiCall = async (method = 'GET', body = null, actionName = '') => {
        try {
          const url = (method === 'GET' && actionName === 'getData') ? `${GAS_URL}?action=getData` : GAS_URL;
          const options = { method, redirect: 'follow' };
          
          if (body && method === 'POST') {
            options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
            options.body = JSON.stringify(body);
          }

          const response = await fetch(url, options);
          const textResponse = await response.text(); 
          try {
            return { success: true, data: JSON.parse(textResponse) };
          } catch (e) {
            return { success: false, error: "ระบบปลายทางเกิดข้อผิดพลาด" };
          }
        } catch (error) {
          return { success: false, error: "ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้" };
        }
      };

      useEffect(() => {
        fetchImagesData();
      }, []);

      const fetchImagesData = async () => {
        setIsLoading(true);
        const result = await apiCall('GET', null, 'getData');
        if (result.success && result.data.status === 'success') {
          const fetchedImages = result.data.data ? result.data.data.reverse() : [];
          setImages(fetchedImages);
          updateTabsList(fetchedImages);
        } else {
          showToast(result.error || "เกิดข้อผิดพลาดในการโหลดข้อมูล", 'error');
        }
        setIsLoading(false);
      };

      const updateTabsList = (imgData) => {
        const uniqueTabs = ['All', ...new Set(imgData.map(img => img.TabName).filter(Boolean))];
        setTabs(uniqueTabs);
        if (uniqueTabs.length > 1 && globalTab === 'General' && !uniqueTabs.includes('General')) {
          setGlobalTab(uniqueTabs[1]);
        }
      };

      const handleAuth = (e) => {
        e.preventDefault();
        if (authPassword === ADMIN_PASSWORD) {
          setView('admin');
          setShowAuthModal(false);
          setAuthPassword('');
          setAuthError('');
        } else {
          setAuthError('รหัสผ่านไม่ถูกต้อง');
        }
      };

      const convertFileToWebP = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let { width, height } = img;
              const MAX_SIZE = 1920;
              if (width > MAX_SIZE || height > MAX_SIZE) {
                if (width > height) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                else { width *= MAX_SIZE / height; height = MAX_SIZE; }
              }
              canvas.width = width; canvas.height = height;
              canvas.getContext('2d').drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/webp', 0.8));
            };
            img.onerror = reject;
          };
        });
      };

      const handleFileSelect = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        const newStaged = [];
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          
          let base64Data;
          if (uploadQuality === 'original') {
            base64Data = await new Promise((res) => {
              const r = new FileReader();
              r.onload = ev => res(ev.target.result);
              r.readAsDataURL(file);
            });
          } else {
            base64Data = await convertFileToWebP(file);
          }
          
          newStaged.push({
            id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2),
            imageName: file.name.split('.')[0],
            description: '',
            link: '',
            base64: base64Data,
            preview: base64Data
          });
        }
        
        setStagedFiles(prev => [...prev, ...newStaged]);
        if(fileInputRef.current) fileInputRef.current.value = '';
      };

      const updateStagedFile = (id, field, value) => {
        setStagedFiles(prev => prev.map(f => f.id === id ? { ...f, [field]: value } : f));
      };

      const handleUploadAll = async () => {
        if (stagedFiles.length === 0) return;
        
        const finalTabName = isGlobalNewTab ? (globalNewTabName || 'General') : globalTab;
        if (!finalTabName) {
          showToast("กรุณาระบุชื่อแท็บ", 'error'); return;
        }

        setIsUploading(true);
        const payloadImages = stagedFiles.map(file => ({
          imageName: file.imageName || 'Untitled',
          description: file.description,
          link: file.link,
          tabName: finalTabName,
          base64: file.base64
        }));

        const result = await apiCall('POST', { action: "upload", images: payloadImages });
        
        if (result.success && result.data.status === 'success') {
          showToast("อัพโหลดสำเร็จ!", 'success');
          setStagedFiles([]);
          setIsGlobalNewTab(false);
          setGlobalNewTabName('');
          await fetchImagesData();
        } else {
          showToast(result.error || "การอัพโหลดล้มเหลว", 'error');
        }
        setIsUploading(false);
      };

      // --- ฟังก์ชันดาวน์โหลดภาพ (Cross-Origin Fallback) ---
      const getBlobFromUrlOrProxy = async (url, fileId) => {
        try {
          // พยายาม fetch ตรงๆ ก่อน
          const response = await fetch(url);
          if (!response.ok) throw new Error("CORS or Network Error");
          return await response.blob();
        } catch (error) {
          // หากติด CORS ให้เรียก Proxy ผ่าน GAS
          const proxyRes = await apiCall('POST', { action: 'download_proxy', fileId: fileId });
          if (proxyRes.success && proxyRes.data.status === 'success') {
            const byteCharacters = atob(proxyRes.data.base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
              byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: proxyRes.data.mimeType });
          }
          throw new Error("Unable to download image");
        }
      };

      const processDownloads = async (imagesToDownload) => {
        setIsDownloading(true);
        setDownloadProgress({ current: 0, total: imagesToDownload.length, status: 'กำลังเตรียมไฟล์...' });
        
        if (isIOS) {
          // --- สำหรับ iOS (ใช้ Web Share API รวบไฟล์) ---
          try {
            const filesArray = [];
            for (let i = 0; i < imagesToDownload.length; i++) {
              const imgData = imagesToDownload[i];
              setDownloadProgress({ current: i + 1, total: imagesToDownload.length, status: `กำลังดึงข้อมูล: ${imgData.ImageName || 'รูปภาพ'}` });
              
              const blob = await getBlobFromUrlOrProxy(imgData.DriveFileUrl, imgData.DriveFileId);
              const file = new File([blob], `${imgData.ImageName || 'image_'+i}.jpg`, { type: blob.type || 'image/jpeg' });
              filesArray.push(file);
            }

            setDownloadProgress(prev => ({ ...prev, status: 'กำลังเปิดหน้าต่างบันทึก...' }));
            
            if (navigator.canShare && navigator.canShare({ files: filesArray })) {
              await navigator.share({
                files: filesArray,
                title: 'ดาวน์โหลดรูปภาพ',
                text: 'บันทึกรูปลงอุปกรณ์ของคุณ'
              });
              showToast("ระบบส่งไฟล์เรียบร้อย", 'success');
            } else {
              showToast("อุปกรณ์ไม่รองรับการเซฟหลายไฟล์พร้อมกัน", 'error');
            }
          } catch(err) {
            if (err.name !== "AbortError") {
              showToast("เกิดข้อผิดพลาดในการแชร์ไฟล์", 'error');
            }
          }
        } else {
          // --- สำหรับ Android / PC (ใช้ Loop Click A Tag พร้อมหน่วงเวลา) ---
          for (let i = 0; i < imagesToDownload.length; i++) {
            const imgData = imagesToDownload[i];
            setDownloadProgress({ current: i + 1, total: imagesToDownload.length, status: `กำลังดาวน์โหลด: ${imgData.ImageName || 'รูปภาพ'}` });
            
            try {
              const blob = await getBlobFromUrlOrProxy(imgData.DriveFileUrl, imgData.DriveFileId);
              const blobUrl = URL.createObjectURL(blob);
              
              const a = document.createElement('a');
              a.href = blobUrl;
              a.download = `${imgData.ImageName || 'image_'+i}.jpg`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              
              // ลบ Blob URL หลังโหลดเสร็จนิดนึงเพื่อคืนหน่วยความจำ
              setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
            } catch(e) {
              console.error("Download failed for", imgData.ImageName);
            }
            // หน่วงเวลา 400ms ป้องกัน Browser บล็อกสแปม
            await new Promise(res => setTimeout(res, 400));
          }
          showToast("ดาวน์โหลดไฟล์สำเร็จ", 'success');
        }
        
        setIsDownloading(false);
        setIsDownloadMode(false);
        setSelectedDownloadIds([]);
        if (selectedImage) setSelectedImage(null); // ปิดหน้าต่าง Single ถ้าเปิดอยู่
      };

      const handleConfirmBulkDelete = async () => {
        if (selectedIds.length === 0) return;
        setIsProcessing(true);
        
        const result = await apiCall('POST', { action: "bulk_delete", ids: selectedIds });
        
        if (result.success && result.data.status === 'success') {
          showToast(`ลบรูปภาพ ${result.data.count} รายการสำเร็จ`, 'success');
          const newImages = images.filter(img => !selectedIds.includes(img.ID));
          setImages(newImages);
          updateTabsList(newImages);
          setSelectedIds([]); 
        } else {
          showToast(result.error || "ลบล้มเหลว", 'error');
        }
        
        setIsProcessing(false);
        setShowDeleteModal(false);
      };

      const handleConfirmEdit = async (e) => {
        e.preventDefault();
        if (!itemToEdit) return;
        setIsProcessing(true);

        const finalTab = itemToEdit.isNewTab ? (itemToEdit.newTabName || 'General') : itemToEdit.TabName;
        const payloadItem = { ...itemToEdit, TabName: finalTab };

        const result = await apiCall('POST', { action: "update", item: payloadItem });

        if (result.success && result.data.status === 'success') {
          showToast("อัปเดตข้อมูลสำเร็จ", 'success');
          const newImages = images.map(img => img.ID === payloadItem.ID ? { ...img, ...payloadItem } : img);
          setImages(newImages);
          updateTabsList(newImages);
        } else {
          showToast(result.error || "อัปเดตล้มเหลว", 'error');
        }
        
        setIsProcessing(false);
        setItemToEdit(null);
      };

      const toggleSelection = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
      
      const galleryImages = activeTab === 'All' ? images : images.filter(img => img.TabName === activeTab);
      const adminImages = adminTab === 'All' ? images : images.filter(img => img.TabName === adminTab);

      return (
        <div className="min-h-screen text-gray-800 font-sans selection:bg-gray-200 pb-20 md:pb-0">
          
          {/* Toast Notification */}
          {toastMessage && (
            <div className={`fixed top-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:right-auto md:top-6 z-[80] text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3 text-[13px] md:text-sm animate-slide-up ${
              toastType === 'error' ? 'bg-red-600' : 'bg-gray-900'
            }`}>
              {toastType === 'error' ? <IconAlertTriangle size={18} className="shrink-0" /> : <IconCheckCircle size={18} className="shrink-0" />}
              <span className="font-medium">{toastMessage}</span>
            </div>
          )}

          {/* Download Progress Modal */}
          {isDownloading && (
            <div className="fixed inset-0 z-[100] bg-black/50 blur-backdrop flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-6 md:p-8 max-w-xs w-full shadow-2xl text-center">
                <IconLoader2 size={40} className="animate-spin text-blue-600 mx-auto mb-4" />
                <h3 className="text-lg font-bold mb-2">กำลังประมวลผล</h3>
                <p className="text-gray-500 text-[13px] mb-5">{downloadProgress.status}</p>
                <div className="w-full bg-gray-100 rounded-full h-2 mb-2 overflow-hidden">
                  <div className="bg-blue-600 h-2 rounded-full transition-all duration-300" style={{ width: `${(downloadProgress.current / downloadProgress.total) * 100}%` }}></div>
                </div>
                <p className="text-[11px] font-semibold text-gray-700">{downloadProgress.current} / {downloadProgress.total} รูปภาพ</p>
              </div>
            </div>
          )}

          {/* Header */}
          <header className="sticky top-0 z-40 bg-white/85 blur-backdrop border-b border-gray-100">
            <div className="max-w-7xl mx-auto px-4 md:px-6 h-14 md:h-16 flex items-center justify-between">
              <h1 className="text-lg md:text-xl font-bold tracking-tighter cursor-pointer" onClick={() => { setView('gallery'); setIsDownloadMode(false); }}>
                Gallery<span className="text-gray-400">.</span>
              </h1>
              <div>
                {view === 'admin' ? (
                  <button onClick={() => setView('gallery')} className="text-[11px] md:text-[13px] font-medium text-gray-500 hover:text-gray-900 bg-gray-100 px-3 py-1.5 rounded-full">
                    ออกแอดมิน
                  </button>
                ) : (
                  <button onClick={() => setShowAuthModal(true)} className="text-gray-300 hover:text-gray-600 p-2 rounded-full">
                    <IconLock size={16} />
                  </button>
                )}
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 md:px-6 py-4 md:py-8">
            
            {view === 'gallery' && (
              <div className="animate-fade-in">
                {/* Tabs & Download Controller */}
                <div className="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-4 md:mb-8">
                  {/* Tabs */}
                  <div className="flex overflow-x-auto hidden-scrollbar gap-2 pb-2 md:pb-0 -mx-4 px-4 md:mx-0 md:px-0">
                    {tabs.map(tab => (
                      <button key={tab} onClick={() => { setActiveTab(tab); setSelectedDownloadIds([]); }}
                        className={`whitespace-nowrap px-4 py-2 rounded-full text-[13px] md:text-sm font-medium transition-all ${
                          activeTab === tab ? 'bg-gray-900 text-white shadow-md' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'
                        }`}
                      >
                        {tab}
                      </button>
                    ))}
                  </div>
                  
                  {/* Mode Buttons */}
                  <div className="flex gap-2 self-end md:self-auto shrink-0">
                    {!isDownloadMode ? (
                      <button onClick={() => setIsDownloadMode(true)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-[13px] md:text-sm font-medium transition-colors flex items-center gap-2">
                        <IconDownload size={14} /> เลือกเพื่อดาวน์โหลด
                      </button>
                    ) : (
                      <>
                        <button onClick={() => {
                          if(selectedDownloadIds.length === galleryImages.length) setSelectedDownloadIds([]);
                          else setSelectedDownloadIds(galleryImages.map(img => img.ID));
                        }} className="bg-blue-50 text-blue-600 hover:bg-blue-100 px-4 py-2 rounded-full text-[13px] md:text-sm font-medium transition-colors">
                          {selectedDownloadIds.length === galleryImages.length ? 'ยกเลิกเลือกทั้งหมด' : 'เลือกทั้งหมดในแท็บ'}
                        </button>
                        <button onClick={() => { setIsDownloadMode(false); setSelectedDownloadIds([]); }} className="bg-red-50 text-red-500 hover:bg-red-100 px-4 py-2 rounded-full text-[13px] md:text-sm font-medium transition-colors">
                          ปิด
                        </button>
                      </>
                    )}
                  </div>
                </div>

                {isLoading ? (
                  <div className="flex justify-center items-center py-20 text-gray-400"><IconLoader2 className="animate-spin mr-2" size={24} />กำลังโหลด...</div>
                ) : galleryImages.length === 0 ? (
                  <div className="text-center py-20 text-gray-400 border-2 border-dashed border-gray-200 rounded-2xl bg-white/50">
                    <IconImage size={40} className="mx-auto mb-3 opacity-50" /><p className="text-sm">ไม่มีรูปภาพ</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4 pb-20">
                    {galleryImages.map((img) => (
                      <div 
                        key={img.ID} 
                        onClick={() => {
                          if (isDownloadMode) {
                            setSelectedDownloadIds(prev => prev.includes(img.ID) ? prev.filter(id => id !== img.ID) : [...prev, img.ID]);
                          } else {
                            setSelectedImage(img);
                          }
                        }}
                        className={`group relative aspect-[4/5] bg-gray-100 rounded-xl md:rounded-2xl overflow-hidden shadow-sm transition-all duration-300 cursor-pointer ${isDownloadMode && selectedDownloadIds.includes(img.ID) ? 'border-[3px] border-blue-500 scale-[0.97]' : 'border-[3px] border-transparent'}`}
                      >
                        <img src={img.DriveFileUrl} alt={img.ImageName} className="w-full h-full object-cover" loading="lazy" />
                        
                        {/* Download Checkbox */}
                        {isDownloadMode && (
                          <div className={`absolute top-2 left-2 w-5 h-5 rounded-md border-2 ${selectedDownloadIds.includes(img.ID) ? 'bg-blue-500 border-blue-500' : 'bg-white/80 border-gray-300'} flex items-center justify-center shadow-sm`}>
                             {selectedDownloadIds.includes(img.ID) && <IconCheckCircle size={14} className="text-white" />}
                          </div>
                        )}
                        
                        {/* Overlay สำหรับ Desktop (ซ่อนตอนอยู่โหมดดาวน์โหลด) */}
                        {!isDownloadMode && (
                          <div className="hidden md:flex absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 items-center justify-center">
                            <div className="bg-white/90 text-gray-900 px-4 py-2 rounded-full text-sm font-medium transform translate-y-4 group-hover:translate-y-0 transition-transform shadow-lg">ดูรายละเอียด</div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Admin View */}
            {view === 'admin' && (
              <div className="animate-fade-in space-y-10 md:space-y-12 pb-24">
                
                <section>
                  <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-3">
                    <h2 className="text-xl font-bold">อัพโหลดรูปภาพ</h2>
                    <button onClick={() => fileInputRef.current.click()} className="bg-gray-900 hover:bg-gray-800 text-white px-5 py-3 md:py-2 rounded-full text-[13px] md:text-sm font-medium transition-colors flex items-center justify-center gap-2 shadow-sm">
                      <IconPlus size={16} /> เลือกรูปภาพ
                    </button>
                    <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleFileSelect} />
                  </div>

                  <div className="bg-white border border-gray-200 rounded-2xl p-4 md:p-5 mb-5 flex flex-col md:flex-row gap-4 items-start justify-between shadow-sm">
                    <div className="w-full md:w-auto">
                      <label className="block text-[11px] font-semibold text-gray-500 mb-2 uppercase">ตั้งค่าคุณภาพไฟล์</label>
                      <div className="flex gap-2">
                        <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-xl border border-gray-200 flex-1 md:flex-none">
                          <input type="radio" checked={uploadQuality === 'web'} onChange={() => setUploadQuality('web')} className="w-3.5 h-3.5 accent-gray-900" />
                          <span className="text-[12px] text-gray-700 font-medium">ประหยัดพื้นที่ (WebP)</span>
                        </label>
                        <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-xl border border-gray-200 flex-1 md:flex-none">
                          <input type="radio" checked={uploadQuality === 'original'} onChange={() => setUploadQuality('original')} className="w-3.5 h-3.5 accent-gray-900" />
                          <span className="text-[12px] text-gray-700 font-medium">คุณภาพสูงสุด (Original)</span>
                        </label>
                      </div>
                    </div>

                    <div className="w-full md:w-2/5">
                      <label className="block text-[11px] font-semibold text-gray-500 mb-2 uppercase">บันทึกลงแท็บ (ค่าเริ่มต้น)</label>
                      <div className="flex gap-2">
                        <select 
                          value={isGlobalNewTab ? 'NEW' : globalTab}
                          onChange={(e) => {
                            if(e.target.value === 'NEW') setIsGlobalNewTab(true);
                            else { setIsGlobalNewTab(false); setGlobalTab(e.target.value); }
                          }}
                          className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[13px] font-medium focus:outline-none focus:border-gray-900"
                        >
                          {tabs.filter(t => t !== 'All').map(t => <option key={t} value={t}>{t}</option>)}
                          <option value="NEW">+ สร้างแท็บใหม่</option>
                        </select>
                        {isGlobalNewTab && (
                          <input type="text" value={globalNewTabName} onChange={(e) => setGlobalNewTabName(e.target.value)} placeholder="พิมพ์ชื่อแท็บ..." className="flex-1 bg-white border border-blue-400 rounded-xl px-3 py-2 text-[13px] focus:outline-none" />
                        )}
                      </div>
                    </div>
                  </div>

                  {stagedFiles.length === 0 ? (
                    <div className="border-2 border-dashed border-gray-200 rounded-2xl p-10 text-center bg-gray-50">
                      <IconUpload size={28} className="mx-auto mb-2 text-gray-300" />
                      <h3 className="text-[13px] text-gray-500">ยังไม่มีไฟล์เตรียมอัพโหลด</h3>
                    </div>
                  ) : (
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                      <div className="flex justify-between items-center mb-4">
                        <h3 className="text-[14px] font-semibold text-gray-800">คิวอัพโหลด ({stagedFiles.length})</h3>
                        <button onClick={handleUploadAll} disabled={isUploading} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full text-[12px] font-semibold flex items-center gap-2">
                          {isUploading ? <IconLoader2 size={14} className="animate-spin" /> : <IconUpload size={14} />}
                          {isUploading ? 'กำลังอัพโหลด...' : 'อัพโหลดทั้งหมด'}
                        </button>
                      </div>
                      
                      <div className="space-y-3">
                        {stagedFiles.map((file) => (
                          <div key={file.id} className="flex flex-col md:flex-row gap-3 p-3 rounded-xl border border-gray-100 bg-gray-50 relative">
                            <button onClick={() => setStagedFiles(prev => prev.filter(f => f.id !== file.id))} className="absolute -top-2 -right-2 bg-red-500 text-white p-1 rounded-full shadow-md z-10"><IconX size={12} /></button>
                            <div className="w-full md:w-24 aspect-[4/3] md:aspect-square rounded-lg overflow-hidden shrink-0 border border-gray-200"><img src={file.preview} className="w-full h-full object-cover" /></div>
                            <div className="flex-1 space-y-2">
                              <input type="text" value={file.imageName} onChange={(e) => updateStagedFile(file.id, 'imageName', e.target.value)} placeholder="ชื่อรูปภาพ" className="w-full bg-white border border-gray-200 rounded-lg px-2.5 py-1.5 text-[12px] focus:outline-none" />
                              <textarea value={file.description} onChange={(e) => updateStagedFile(file.id, 'description', e.target.value)} placeholder="คำอธิบายสั้นๆ..." className="w-full bg-white border border-gray-200 rounded-lg px-2.5 py-1.5 text-[12px] h-12 resize-none focus:outline-none" />
                              <input type="url" value={file.link} onChange={(e) => updateStagedFile(file.id, 'link', e.target.value)} placeholder="ลิ้งก์ที่เกี่ยวข้อง (https://)" className="w-full bg-white border border-gray-200 rounded-lg px-2.5 py-1.5 text-[12px] focus:outline-none" />
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </section>

                <section>
                  <div className="border-t border-gray-200 pt-8 mb-4">
                    <h2 className="text-xl font-bold">จัดการรูปภาพ</h2>
                  </div>
                  
                  <div className="flex overflow-x-auto hidden-scrollbar gap-2 mb-4 pb-2 -mx-4 px-4 md:mx-0 md:px-0">
                    {tabs.map(tab => (
                      <button key={tab} onClick={() => { setAdminTab(tab); setSelectedIds([]); }}
                        className={`whitespace-nowrap px-4 py-1.5 rounded-full text-[12px] font-medium transition-colors ${
                          adminTab === tab ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600 border border-gray-200'
                        }`}
                      >
                        {tab}
                      </button>
                    ))}
                    {adminImages.length > 0 && (
                      <button onClick={() => setSelectedIds(selectedIds.length === adminImages.length ? [] : adminImages.map(img => img.ID))} className="ml-auto whitespace-nowrap px-3 py-1.5 rounded-full text-[12px] font-medium bg-blue-50 text-blue-600 shrink-0">
                        {selectedIds.length === adminImages.length ? 'ยกเลิก' : 'เลือกทั้งหมด'}
                      </button>
                    )}
                  </div>

                  {isLoading ? (
                    <div className="text-center py-10 text-gray-400"><IconLoader2 className="animate-spin inline mr-2" /> โหลดข้อมูล...</div>
                  ) : adminImages.length === 0 ? (
                     <div className="text-center py-10 text-gray-400 bg-gray-50 rounded-2xl border-2 border-dashed">ไม่มีรูปภาพ</div>
                  ) : (
                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3">
                      {adminImages.map(img => (
                        <div key={img.ID} onClick={() => toggleSelection(img.ID)} className={`group relative aspect-square bg-gray-100 rounded-xl overflow-hidden shadow-sm transition-all border-[3px] cursor-pointer ${selectedIds.includes(img.ID) ? 'border-blue-500 scale-[0.96]' : 'border-transparent'}`}>
                          <img src={img.DriveFileUrl} alt={img.ImageName} className="w-full h-full object-cover" loading="lazy" />
                          <div className={`absolute top-2 left-2 w-5 h-5 rounded-md border-2 ${selectedIds.includes(img.ID) ? 'bg-blue-500 border-blue-500' : 'bg-white/80 border-gray-300'} flex items-center justify-center`}>
                             {selectedIds.includes(img.ID) && <IconCheckCircle size={14} className="text-white" />}
                          </div>
                          <div className="absolute top-2 right-2 bg-black/60 text-white text-[9px] px-1.5 py-0.5 rounded blur-backdrop">{img.TabName}</div>
                          <div className="absolute bottom-2 right-2">
                            <button onClick={(e) => { e.stopPropagation(); setItemToEdit(img); }} className="bg-white/90 text-gray-800 p-2 rounded-full shadow-md"><IconEdit2 size={14} /></button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </section>
              </div>
            )}
          </main>

          {/* Floating Buttons */}
          {view === 'admin' && selectedIds.length > 0 && (
            <div className="fixed bottom-6 left-0 right-0 px-4 z-40 flex justify-center animate-slide-up">
              <button onClick={() => setShowDeleteModal(true)} className="bg-red-500 hover:bg-red-600 text-white px-6 py-3.5 rounded-full text-[13px] font-bold shadow-2xl flex items-center gap-2 max-w-xs w-full justify-center">
                <IconTrash2 size={16} /> ลบ {selectedIds.length} รายการ
              </button>
            </div>
          )}

          {view === 'gallery' && isDownloadMode && selectedDownloadIds.length > 0 && (
            <div className="fixed bottom-6 left-0 right-0 px-4 z-40 flex justify-center animate-slide-up">
              <button onClick={() => processDownloads(images.filter(img => selectedDownloadIds.includes(img.ID)))} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3.5 rounded-full text-[13px] font-bold shadow-2xl flex items-center gap-2 max-w-xs w-full justify-center">
                <IconDownload size={16} /> ดาวน์โหลด {selectedDownloadIds.length} รูป
              </button>
            </div>
          )}
          
          {/* Auth Modal */}
          {showAuthModal && (
            <div className="fixed inset-0 z-50 bg-black/50 blur-backdrop flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl">
                <div className="flex justify-between items-center mb-5"><h3 className="text-lg font-bold flex items-center gap-2"><IconLock size={18} className="text-gray-400" /> เข้าสู่ระบบ</h3><button onClick={() => setShowAuthModal(false)} className="text-gray-400"><IconX size={18} /></button></div>
                <form onSubmit={handleAuth}>
                  <div className="mb-5"><input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-gray-900 text-sm" placeholder="รหัสผ่าน" autoFocus />
                    {authError && <p className="text-red-500 text-[11px] mt-1.5 ml-1">{authError}</p>}
                  </div>
                  <button type="submit" className="w-full bg-gray-900 text-white rounded-xl py-3 text-sm font-medium">ยืนยัน</button>
                </form>
              </div>
            </div>
          )}

          {/* Bulk Delete Modal */}
          {showDeleteModal && (
            <div className="fixed inset-0 z-50 bg-black/50 blur-backdrop flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-6 max-w-xs w-full shadow-2xl text-center">
                <div className="w-12 h-12 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-3"><IconAlertTriangle size={24} /></div>
                <h3 className="text-lg font-bold mb-1">ยืนยันการลบ?</h3>
                <p className="text-gray-500 text-[12px] mb-5">ลบรูปภาพ <span className="font-bold text-red-600">{selectedIds.length}</span> รูป ไม่สามารถกู้คืนได้</p>
                <div className="flex gap-2">
                  <button onClick={() => setShowDeleteModal(false)} disabled={isProcessing} className="flex-1 bg-gray-100 text-gray-800 rounded-xl py-2.5 text-[13px] font-medium">ยกเลิก</button>
                  <button onClick={handleConfirmBulkDelete} disabled={isProcessing} className="flex-1 bg-red-500 text-white rounded-xl py-2.5 text-[13px] font-medium flex items-center justify-center gap-2">
                    {isProcessing ? <IconLoader2 size={14} className="animate-spin" /> : 'ลบเลย'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Edit Modal */}
          {itemToEdit && (
            <div className="fixed inset-0 z-50 bg-black/50 blur-backdrop flex items-end md:items-center justify-center md:p-4 animate-fade-in">
              <div className="bg-white rounded-t-3xl md:rounded-3xl overflow-hidden max-w-3xl w-full shadow-2xl flex flex-col md:flex-row max-h-[85vh] md:max-h-[80vh]">
                <div className="hidden md:block md:w-2/5 bg-gray-100"><img src={itemToEdit.DriveFileUrl} className="w-full h-full object-cover" /></div>
                <div className="w-full md:w-3/5 p-5 md:p-6 overflow-y-auto hidden-scrollbar">
                  <div className="flex justify-between items-center mb-4"><h3 className="text-lg font-bold flex items-center gap-2"><IconEdit2 size={16} className="text-gray-400"/> แก้ไขข้อมูล</h3><button onClick={() => setItemToEdit(null)} className="bg-gray-100 p-1.5 rounded-full"><IconX size={16} /></button></div>
                  <div className="md:hidden w-20 h-20 rounded-lg overflow-hidden mb-4 border border-gray-200 mx-auto"><img src={itemToEdit.DriveFileUrl} className="w-full h-full object-cover" /></div>
                  <form onSubmit={handleConfirmEdit} className="space-y-3">
                    <div><label className="block text-[11px] font-medium text-gray-500 mb-1">ชื่อรูป</label><input type="text" required value={itemToEdit.ImageName || ''} onChange={(e) => setItemToEdit({...itemToEdit, ImageName: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-[13px] focus:outline-none" /></div>
                    <div><label className="block text-[11px] font-medium text-gray-500 mb-1">หมวดหมู่</label>
                      <div className="flex gap-2">
                        <select value={itemToEdit.isNewTab ? 'NEW' : (itemToEdit.TabName || 'General')} onChange={(e) => { if(e.target.value === 'NEW') setItemToEdit({...itemToEdit, isNewTab: true}); else setItemToEdit({...itemToEdit, isNewTab: false, TabName: e.target.value}); }} className="flex-1 bg-white border border-gray-200 rounded-lg px-2 py-2 text-[13px] focus:outline-none">
                          {tabs.filter(t => t !== 'All').map(t => <option key={t} value={t}>{t}</option>)}<option value="NEW">+ แท็บใหม่</option>
                        </select>
                        {itemToEdit.isNewTab && <input type="text" required placeholder="ชื่อแท็บ" value={itemToEdit.newTabName || ''} onChange={(e) => setItemToEdit({...itemToEdit, newTabName: e.target.value})} className="flex-1 bg-white border border-blue-400 rounded-lg px-2 py-2 text-[13px] focus:outline-none" />}
                      </div>
                    </div>
                    <div><label className="block text-[11px] font-medium text-gray-500 mb-1">คำอธิบาย</label><textarea value={itemToEdit.Description || ''} onChange={(e) => setItemToEdit({...itemToEdit, Description: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-[13px] h-[60px] resize-none focus:outline-none" /></div>
                    <div><label className="block text-[11px] font-medium text-gray-500 mb-1">ลิ้งก์</label><input type="url" value={itemToEdit.Link || ''} onChange={(e) => setItemToEdit({...itemToEdit, Link: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-[13px] focus:outline-none" /></div>
                    <div className="pt-2 pb-4 flex gap-2">
                       <button type="button" onClick={() => setItemToEdit(null)} disabled={isProcessing} className="flex-1 bg-gray-100 rounded-xl py-2.5 text-[13px] font-medium">ยกเลิก</button>
                       <button type="submit" disabled={isProcessing} className="flex-1 bg-blue-600 text-white rounded-xl py-2.5 text-[13px] font-medium flex items-center justify-center gap-2">{isProcessing ? <IconLoader2 size={14} className="animate-spin" /> : 'บันทึก'}</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* Image Detail Modal (Single View) */}
          {selectedImage && (
            <div className="fixed inset-0 z-[60] bg-white md:bg-white/95 md:blur-backdrop flex flex-col md:flex-row md:items-center justify-center md:p-8 animate-fade-in">
              <button onClick={() => setSelectedImage(null)} className="absolute top-4 right-4 md:top-6 md:right-6 p-2 bg-gray-100/80 rounded-full z-[70] blur-backdrop"><IconX size={20} /></button>
              
              <div className="w-full h-[50vh] md:h-[80vh] md:w-2/3 bg-gray-50 flex items-center justify-center md:rounded-3xl overflow-hidden shrink-0">
                <img src={selectedImage.DriveFileUrl} alt={selectedImage.ImageName} className="w-full h-full object-contain" />
              </div>
              
              <div className="w-full h-[50vh] md:h-auto md:w-1/3 px-6 py-8 flex flex-col justify-start md:justify-center bg-white rounded-t-3xl -mt-6 md:mt-0 relative z-[65] overflow-y-auto hidden-scrollbar shadow-[0_-10px_40px_rgba(0,0,0,0.05)] md:shadow-none">
                <span className="inline-block px-3 py-1 bg-gray-100 text-gray-600 text-[11px] font-semibold rounded-full mb-3 w-max">{selectedImage.TabName}</span>
                <h2 className="text-2xl md:text-3xl font-bold mb-2 leading-tight">{selectedImage.ImageName}</h2>
                <p className="text-gray-600 leading-relaxed mb-6 text-[14px] md:text-[15px]">{selectedImage.Description || 'ไม่มีคำอธิบาย'}</p>
                
                <div className="flex flex-col gap-3 mt-auto md:mt-0 pb-6 md:pb-0">
                  {selectedImage.Link && (
                    <a href={selectedImage.Link.startsWith('http') ? selectedImage.Link : `https://${selectedImage.Link}`} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center bg-gray-900 text-white px-5 py-3.5 rounded-full w-full text-[14px] font-medium shadow-md">
                      ไปที่เว็บไซต์ที่เกี่ยวข้อง
                    </a>
                  )}
                  {/* ปุ่มดาวน์โหลดแบบ Single */}
                  <button onClick={() => processDownloads([selectedImage])} className="flex items-center justify-center gap-2 bg-blue-50 text-blue-600 px-5 py-3.5 rounded-full w-full text-[14px] font-medium transition-colors">
                    <IconDownload size={16} /> ดาวน์โหลดรูปนี้
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
