<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Gallery</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #fafafa;
    }
    .hidden-scrollbar::-webkit-scrollbar { display: none; }
    .hidden-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .animate-fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .blur-backdrop {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // สร้าง Icon ด้วย SVG เพื่อให้ไม่ต้องพึ่งพาไลบรารีภายนอก
    const IconInfo = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
    const IconLock = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const IconUpload = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
    const IconImage = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconX = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconPlus = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconCheckCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconLoader2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>;
    const IconEdit2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
    const IconTrash2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconAlertTriangle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconSave = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbwzkz3J85_sKApRRBRUk2JKTOn8AFnxZOi846eqL1IEjdAJkbfHUD09jtZYCO1ecV8z/exec"; 
    const ADMIN_PASSWORD = "nik12345";

    function App() {
      const [images, setImages] = useState([]);
      const [tabs, setTabs] = useState(['All']);
      const [isLoading, setIsLoading] = useState(true);
      const [view, setView] = useState('gallery');
      
      const [activeTab, setActiveTab] = useState('All');
      const [selectedImage, setSelectedImage] = useState(null);

      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authPassword, setAuthPassword] = useState('');
      const [authError, setAuthError] = useState('');

      const fileInputRef = useRef(null);
      const [stagedFiles, setStagedFiles] = useState([]);
      const [isUploading, setIsUploading] = useState(false);
      
      // ฟีเจอร์ใหม่: เลือกคุณภาพ และ เลือกแท็บทีเดียว
      const [uploadQuality, setUploadQuality] = useState('web'); // 'web' หรือ 'original'
      const [globalTab, setGlobalTab] = useState('General');
      const [isGlobalNewTab, setIsGlobalNewTab] = useState(false);
      const [globalNewTabName, setGlobalNewTabName] = useState('');

      const [toastMessage, setToastMessage] = useState(null);
      const [toastType, setToastType] = useState('success');

      // ฟีเจอร์ใหม่: จัดการรูปหลายรูป (Bulk Delete)
      const [adminTab, setAdminTab] = useState('All');
      const [selectedIds, setSelectedIds] = useState([]);
      const [itemToEdit, setItemToEdit] = useState(null);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);

      const showToast = (message, type = 'success') => {
        setToastMessage(message);
        setToastType(type);
        setTimeout(() => setToastMessage(null), 3000);
      };

      const apiCall = async (method = 'GET', body = null, actionName = '') => {
        try {
          const url = (method === 'GET' && actionName === 'getData') ? `${GAS_URL}?action=getData` : GAS_URL;
          const options = { method, redirect: 'follow' };
          
          if (body && method === 'POST') {
            options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
            options.body = JSON.stringify(body);
          }

          const response = await fetch(url, options);
          const textResponse = await response.text(); 
          try {
            return { success: true, data: JSON.parse(textResponse) };
          } catch (e) {
            return { success: false, error: "ระบบปลายทางเกิดข้อผิดพลาดในการคืนค่า JSON" };
          }
        } catch (error) {
          return { success: false, error: "ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้" };
        }
      };

      useEffect(() => {
        fetchImagesData();
      }, []);

      const fetchImagesData = async () => {
        setIsLoading(true);
        const result = await apiCall('GET', null, 'getData');
        if (result.success && result.data.status === 'success') {
          const fetchedImages = result.data.data ? result.data.data.reverse() : [];
          setImages(fetchedImages);
          updateTabsList(fetchedImages);
        } else {
          showToast(result.error || "เกิดข้อผิดพลาดในการโหลดข้อมูล", 'error');
        }
        setIsLoading(false);
      };

      const updateTabsList = (imgData) => {
        const uniqueTabs = ['All', ...new Set(imgData.map(img => img.TabName).filter(Boolean))];
        setTabs(uniqueTabs);
        if (uniqueTabs.length > 1 && globalTab === 'General') {
          setGlobalTab(uniqueTabs[1]);
        }
      };

      const handleAuth = (e) => {
        e.preventDefault();
        if (authPassword === ADMIN_PASSWORD) {
          setView('admin');
          setShowAuthModal(false);
          setAuthPassword('');
          setAuthError('');
        } else {
          setAuthError('รหัสผ่านไม่ถูกต้อง');
        }
      };

      const convertFileToWebP = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let { width, height } = img;
              const MAX_SIZE = 1920;
              if (width > MAX_SIZE || height > MAX_SIZE) {
                if (width > height) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                else { width *= MAX_SIZE / height; height = MAX_SIZE; }
              }
              canvas.width = width; canvas.height = height;
              canvas.getContext('2d').drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/webp', 0.8));
            };
            img.onerror = reject;
          };
        });
      };

      const handleFileSelect = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        const newStaged = [];
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          
          let base64Data;
          if (uploadQuality === 'original') {
            base64Data = await new Promise((res) => {
              const r = new FileReader();
              r.onload = ev => res(ev.target.result);
              r.readAsDataURL(file);
            });
          } else {
            base64Data = await convertFileToWebP(file);
          }
          
          newStaged.push({
            id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2),
            imageName: file.name.split('.')[0],
            description: '',
            link: '',
            base64: base64Data,
            preview: base64Data
          });
        }
        
        setStagedFiles(prev => [...prev, ...newStaged]);
        if(fileInputRef.current) fileInputRef.current.value = '';
      };

      const updateStagedFile = (id, field, value) => {
        setStagedFiles(prev => prev.map(f => f.id === id ? { ...f, [field]: value } : f));
      };

      const handleUploadAll = async () => {
        if (stagedFiles.length === 0) return;
        
        const finalTabName = isGlobalNewTab ? (globalNewTabName || 'General') : globalTab;
        if (!finalTabName) {
          showToast("กรุณาระบุชื่อแท็บ", 'error'); return;
        }

        setIsUploading(true);
        const payloadImages = stagedFiles.map(file => ({
          imageName: file.imageName || 'Untitled',
          description: file.description,
          link: file.link,
          tabName: finalTabName,
          base64: file.base64
        }));

        const result = await apiCall('POST', { action: "upload", images: payloadImages });
        
        if (result.success && result.data.status === 'success') {
          showToast("อัพโหลดสำเร็จ!", 'success');
          setStagedFiles([]);
          setIsGlobalNewTab(false);
          setGlobalNewTabName('');
          await fetchImagesData();
        } else {
          showToast(result.error || "การอัพโหลดล้มเหลว", 'error');
        }
        setIsUploading(false);
      };

      const handleConfirmBulkDelete = async () => {
        if (selectedIds.length === 0) return;
        setIsProcessing(true);
        
        const result = await apiCall('POST', { action: "bulk_delete", ids: selectedIds });
        
        if (result.success && result.data.status === 'success') {
          showToast(`ลบรูปภาพ ${result.data.count} รายการสำเร็จ`, 'success');
          const newImages = images.filter(img => !selectedIds.includes(img.ID));
          setImages(newImages);
          updateTabsList(newImages);
          setSelectedIds([]); // เคลียร์การเลือก
        } else {
          showToast(result.error || "ลบล้มเหลว", 'error');
        }
        
        setIsProcessing(false);
        setShowDeleteModal(false);
      };

      const handleConfirmEdit = async (e) => {
        e.preventDefault();
        if (!itemToEdit) return;
        setIsProcessing(true);

        const finalTab = itemToEdit.isNewTab ? (itemToEdit.newTabName || 'General') : itemToEdit.TabName;
        const payloadItem = { ...itemToEdit, TabName: finalTab };

        const result = await apiCall('POST', { action: "update", item: payloadItem });

        if (result.success && result.data.status === 'success') {
          showToast("อัปเดตข้อมูลสำเร็จ", 'success');
          const newImages = images.map(img => img.ID === payloadItem.ID ? { ...img, ...payloadItem } : img);
          setImages(newImages);
          updateTabsList(newImages);
        } else {
          showToast(result.error || "อัปเดตล้มเหลว", 'error');
        }
        
        setIsProcessing(false);
        setItemToEdit(null);
      };

      const toggleSelection = (id) => {
        setSelectedIds(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
      };
      
      const toggleSelectAll = (filteredImgs) => {
        if (selectedIds.length === filteredImgs.length) {
          setSelectedIds([]); 
        } else {
          setSelectedIds(filteredImgs.map(img => img.ID)); 
        }
      };

      const galleryImages = activeTab === 'All' ? images : images.filter(img => img.TabName === activeTab);
      const adminImages = adminTab === 'All' ? images : images.filter(img => img.TabName === adminTab);

      return (
        <div className="min-h-screen text-gray-800 font-sans selection:bg-gray-200">
          
          {/* Toast Notification */}
          {toastMessage && (
            <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[60] text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 text-sm animate-fade-in ${
              toastType === 'error' ? 'bg-red-600' : 'bg-gray-900'
            }`}>
              {toastType === 'error' ? <IconAlertTriangle size={16} /> : <IconCheckCircle size={16} />}
              {toastMessage}
            </div>
          )}

          {/* Header */}
          <header className="sticky top-0 z-40 bg-white/80 blur-backdrop border-b border-gray-100">
            <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
              <h1 
                className="text-2xl font-bold tracking-tighter cursor-pointer hover:opacity-70 transition-opacity"
                onClick={() => setView('gallery')}
              >
                Gallery<span className="text-gray-400">.</span>
              </h1>
              <div>
                {view === 'admin' ? (
                  <button onClick={() => setView('gallery')} className="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">
                    ออกจากระบบแอดมิน
                  </button>
                ) : (
                  <button onClick={() => setShowAuthModal(true)} className="text-gray-300 hover:text-gray-600 p-2 rounded-full">
                    <IconLock size={16} />
                  </button>
                )}
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-12">
            
            {/* Gallery View */}
            {view === 'gallery' && (
              <div className="animate-fade-in">
                <div className="flex flex-wrap gap-2 mb-12 justify-center">
                  {tabs.map(tab => (
                    <button key={tab} onClick={() => setActiveTab(tab)}
                      className={`px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 ${
                        activeTab === tab ? 'bg-gray-900 text-white shadow-md' : 'bg-white text-gray-500 hover:bg-gray-100 border border-gray-100'
                      }`}
                    >
                      {tab}
                    </button>
                  ))}
                </div>

                {isLoading ? (
                  <div className="flex justify-center items-center py-32 text-gray-400"><IconLoader2 className="animate-spin mr-2" size={24} />กำลังโหลด...</div>
                ) : galleryImages.length === 0 ? (
                  <div className="text-center py-32 text-gray-400 border-2 border-dashed border-gray-200 rounded-2xl bg-white/50">
                    <IconImage size={48} className="mx-auto mb-4 opacity-50" /><p>ไม่มีรูปภาพในหมวดหมู่นี้</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    {galleryImages.map((img) => (
                      <div key={img.ID} className="group relative aspect-[4/5] bg-gray-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500">
                        <img src={img.DriveFileUrl} alt={img.ImageName} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy" />
                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                          <button onClick={() => setSelectedImage(img)} className="bg-white/20 hover:bg-white text-white hover:text-black blur-backdrop p-3 rounded-full transition-all transform translate-y-4 group-hover:translate-y-0">
                            <IconInfo size={24} />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Admin View */}
            {view === 'admin' && (
              <div className="animate-fade-in max-w-5xl mx-auto space-y-16">
                
                {/* Upload Section */}
                <section>
                  <div className="flex items-center justify-between mb-8">
                    <h2 className="text-2xl font-bold">อัพโหลดรูปภาพใหม่</h2>
                    <button onClick={() => fileInputRef.current.click()} className="bg-gray-900 hover:bg-gray-800 text-white px-6 py-3 rounded-full text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                      <IconPlus size={18} /> เลือกรูปภาพ
                    </button>
                    <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleFileSelect} />
                  </div>

                  {/* ควบคุมการตั้งค่าก่อนอัพโหลด (Global Settings) */}
                  <div className="bg-gray-50 border border-gray-200 rounded-3xl p-6 mb-8 flex flex-col md:flex-row gap-6 items-start md:items-center justify-between">
                    <div className="w-full md:w-auto">
                      <label className="block text-sm font-semibold text-gray-700 mb-2">คุณภาพรูปภาพที่อัพโหลด</label>
                      <div className="flex gap-4">
                        <label className="flex items-center gap-2 cursor-pointer">
                          <input type="radio" name="quality" checked={uploadQuality === 'web'} onChange={() => setUploadQuality('web')} className="w-4 h-4 accent-gray-900" />
                          <span className="text-sm text-gray-600">สำหรับเว็บ (WebP บีบอัดเร็ว)</span>
                        </label>
                        <label className="flex items-center gap-2 cursor-pointer">
                          <input type="radio" name="quality" checked={uploadQuality === 'original'} onChange={() => setUploadQuality('original')} className="w-4 h-4 accent-gray-900" />
                          <span className="text-sm text-gray-600">ต้นฉบับ (ชัดสุด)</span>
                        </label>
                      </div>
                    </div>

                    <div className="w-full md:w-1/2">
                      <label className="block text-sm font-semibold text-gray-700 mb-2">เลือกแท็บ (โฟลเดอร์) สำหรับรายการทั้งหมด</label>
                      <div className="flex gap-2">
                        <select 
                          value={isGlobalNewTab ? 'NEW' : globalTab}
                          onChange={(e) => {
                            if(e.target.value === 'NEW') setIsGlobalNewTab(true);
                            else { setIsGlobalNewTab(false); setGlobalTab(e.target.value); }
                          }}
                          className="flex-1 bg-white border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-gray-900"
                        >
                          {tabs.filter(t => t !== 'All').map(t => <option key={t} value={t}>{t}</option>)}
                          <option value="NEW">+ สร้างแท็บใหม่</option>
                        </select>
                        {isGlobalNewTab && (
                          <input type="text" value={globalNewTabName} onChange={(e) => setGlobalNewTabName(e.target.value)} placeholder="พิมพ์ชื่อแท็บใหม่..." className="flex-1 bg-white border border-blue-400 rounded-xl px-4 py-2 text-sm focus:outline-none" />
                        )}
                      </div>
                    </div>
                  </div>

                  {stagedFiles.length === 0 ? (
                    <div className="border-2 border-dashed border-gray-200 rounded-3xl p-16 text-center bg-white/50">
                      <IconUpload size={40} className="mx-auto mb-4 text-gray-300" />
                      <h3 className="text-lg font-medium text-gray-700 mb-2">ยังไม่มีไฟล์เตรียมอัพโหลด</h3>
                    </div>
                  ) : (
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                      <div className="flex justify-between items-center mb-6">
                        <h3 className="text-lg font-semibold text-gray-700">รายการที่เตรียมอัพโหลด ({stagedFiles.length})</h3>
                        <button onClick={handleUploadAll} disabled={isUploading} className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white px-6 py-2 rounded-full text-sm font-medium flex items-center gap-2">
                          {isUploading ? <IconLoader2 size={16} className="animate-spin" /> : <IconUpload size={16} />}
                          {isUploading ? 'กำลังอัพโหลด...' : 'ยืนยันอัพโหลดทั้งหมด'}
                        </button>
                      </div>
                      
                      <div className="space-y-4">
                        {stagedFiles.map((file) => (
                          <div key={file.id} className="flex flex-col sm:flex-row gap-6 p-4 rounded-2xl border border-gray-100 bg-gray-50 relative">
                            <button onClick={() => setStagedFiles(prev => prev.filter(f => f.id !== file.id))} className="absolute -top-3 -right-3 bg-red-500 hover:bg-red-600 text-white p-1.5 rounded-full shadow-md">
                              <IconX size={14} />
                            </button>
                            <div className="w-full sm:w-32 aspect-square rounded-xl overflow-hidden bg-white shrink-0 border border-gray-100">
                              <img src={file.preview} alt="preview" className="w-full h-full object-cover" />
                            </div>
                            <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4">
                              <div className="space-y-3">
                                <label className="text-xs text-gray-500 font-medium">ชื่อรูปภาพ</label>
                                <input type="text" value={file.imageName} onChange={(e) => updateStagedFile(file.id, 'imageName', e.target.value)} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none" />
                                
                                <label className="text-xs text-gray-500 font-medium block mt-3">ลิ้งก์ที่เกี่ยวข้อง</label>
                                <input type="url" value={file.link} onChange={(e) => updateStagedFile(file.id, 'link', e.target.value)} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none" placeholder="https://" />
                              </div>
                              <div className="space-y-3">
                                <label className="text-xs text-gray-500 font-medium">คำอธิบาย</label>
                                <textarea value={file.description} onChange={(e) => updateStagedFile(file.id, 'description', e.target.value)} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm h-full min-h-[90px] resize-none focus:outline-none" />
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </section>

                {/* Manage Section */}
                <section>
                  <div className="border-t border-gray-200 pt-16 mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
                    <div>
                      <h2 className="text-2xl font-bold">จัดการรูปภาพทั้งหมด</h2>
                      <p className="text-sm text-gray-500 mt-1">แก้ไขข้อมูล หรือเลือกลบทีละหลายๆ รูปได้ที่นี่</p>
                    </div>
                    {selectedIds.length > 0 && (
                      <button onClick={() => setShowDeleteModal(true)} className="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-full text-sm font-medium flex items-center gap-2 shadow-lg animate-fade-in">
                        <IconTrash2 size={16} /> ลบ {selectedIds.length} รายการ
                      </button>
                    )}
                  </div>
                  
                  {/* Admin Tabs Filter */}
                  <div className="flex flex-wrap gap-2 mb-6">
                    {tabs.map(tab => (
                      <button key={tab} onClick={() => { setAdminTab(tab); setSelectedIds([]); }}
                        className={`px-4 py-1.5 rounded-full text-xs font-medium transition-colors ${
                          adminTab === tab ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        }`}
                      >
                        {tab}
                      </button>
                    ))}
                    {adminImages.length > 0 && (
                      <button onClick={() => toggleSelectAll(adminImages)} className="ml-auto px-4 py-1.5 rounded-full text-xs font-medium bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors">
                        {selectedIds.length === adminImages.length ? 'ยกเลิกการเลือกทั้งหมด' : 'เลือกทั้งหมด'}
                      </button>
                    )}
                  </div>

                  {isLoading ? (
                    <div className="text-center py-12 text-gray-400"><IconLoader2 className="animate-spin inline mr-2" /> กำลังโหลด...</div>
                  ) : adminImages.length === 0 ? (
                     <div className="text-center py-12 text-gray-400 bg-white/50 rounded-2xl border-2 border-dashed">ไม่มีรูปภาพในระบบ</div>
                  ) : (
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                      {adminImages.map(img => (
                        <div key={img.ID} onClick={() => toggleSelection(img.ID)} className={`group relative aspect-square bg-gray-100 rounded-xl overflow-hidden shadow-sm transition-all border-2 cursor-pointer ${selectedIds.includes(img.ID) ? 'border-blue-500' : 'border-transparent hover:border-gray-300'}`}>
                          
                          <img src={img.DriveFileUrl} alt={img.ImageName} className="w-full h-full object-cover" loading="lazy" />
                          
                          {/* Checkbox overlay */}
                          <div className={`absolute top-2 left-2 w-5 h-5 rounded border ${selectedIds.includes(img.ID) ? 'bg-blue-500 border-blue-500' : 'bg-white/80 border-gray-400'} flex items-center justify-center shadow-sm`}>
                             {selectedIds.includes(img.ID) && <IconCheckCircle size={14} className="text-white" />}
                          </div>

                          <div className="absolute top-2 right-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded blur-backdrop">
                            {img.TabName}
                          </div>

                          <div className="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={(e) => { e.stopPropagation(); setItemToEdit(img); }} className="bg-white/90 hover:bg-white text-gray-800 p-2 rounded-full shadow-md" title="แก้ไขข้อมูล">
                              <IconEdit2 size={14} />
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </section>
              </div>
            )}
          </main>

          
          {/* Auth Modal */}
          {showAuthModal && (
            <div className="fixed inset-0 z-50 bg-black/60 blur-backdrop flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-bold flex items-center gap-2"><IconLock size={20} className="text-gray-400" /> เข้าสู่ระบบ</h3>
                  <button onClick={() => setShowAuthModal(false)} className="text-gray-400 hover:text-gray-900"><IconX size={20} /></button>
                </div>
                <form onSubmit={handleAuth}>
                  <div className="mb-6">
                    <input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-gray-900" placeholder="กรอกรหัสผ่าน" autoFocus />
                    {authError && <p className="text-red-500 text-sm mt-2">{authError}</p>}
                  </div>
                  <button type="submit" className="w-full bg-gray-900 hover:bg-black text-white rounded-xl py-3 font-medium transition-colors">เข้าสู่ระบบ</button>
                </form>
              </div>
            </div>
          )}

          {/* Bulk Delete Confirmation Modal */}
          {showDeleteModal && (
            <div className="fixed inset-0 z-50 bg-black/60 blur-backdrop flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><IconAlertTriangle size={32} /></div>
                <h3 className="text-xl font-bold mb-2">ยืนยันการลบรูปภาพ?</h3>
                <p className="text-gray-500 text-sm mb-8">คุณกำลังจะลบรูปภาพจำนวน <span className="font-bold text-red-600">{selectedIds.length}</span> รูป<br/>การกระทำนี้ไม่สามารถย้อนกลับได้</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowDeleteModal(false)} disabled={isProcessing} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-xl py-3 font-medium transition-colors">ยกเลิก</button>
                  <button onClick={handleConfirmBulkDelete} disabled={isProcessing} className="flex-1 bg-red-500 hover:bg-red-600 disabled:bg-red-300 text-white rounded-xl py-3 font-medium flex items-center justify-center gap-2">
                    {isProcessing ? <IconLoader2 size={18} className="animate-spin" /> : <IconTrash2 size={18} />}
                    {isProcessing ? 'กำลังลบ...' : 'ลบเลย'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Edit Modal */}
          {itemToEdit && (
            <div className="fixed inset-0 z-50 bg-black/60 blur-backdrop flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white rounded-3xl overflow-hidden max-w-3xl w-full shadow-2xl flex flex-col md:flex-row">
                <div className="w-full md:w-2/5 bg-gray-100"><img src={itemToEdit.DriveFileUrl} alt="edit preview" className="w-full h-full object-cover max-h-[30vh] md:max-h-full" /></div>
                <div className="w-full md:w-3/5 p-6 md:p-8">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-xl font-bold flex items-center gap-2"><IconEdit2 size={20} className="text-gray-400"/> แก้ไขข้อมูล</h3>
                    <button onClick={() => setItemToEdit(null)} className="text-gray-400 hover:text-gray-900"><IconX size={20} /></button>
                  </div>
                  <form onSubmit={handleConfirmEdit} className="space-y-4">
                    <div>
                      <label className="block text-xs font-medium text-gray-500 mb-1">ชื่อรูปภาพ</label>
                      <input type="text" required value={itemToEdit.ImageName || ''} onChange={(e) => setItemToEdit({...itemToEdit, ImageName: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-500 mb-1">หมวดหมู่ (แท็บ)</label>
                      <div className="flex gap-2">
                        <select value={itemToEdit.isNewTab ? 'NEW' : (itemToEdit.TabName || 'General')} onChange={(e) => { if(e.target.value === 'NEW') setItemToEdit({...itemToEdit, isNewTab: true}); else setItemToEdit({...itemToEdit, isNewTab: false, TabName: e.target.value}); }} className="w-1/2 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                          {tabs.filter(t => t !== 'All').map(t => <option key={t} value={t}>{t}</option>)}
                          <option value="NEW">+ สร้างแท็บใหม่</option>
                        </select>
                        {itemToEdit.isNewTab && (
                          <input type="text" required placeholder="ชื่อแท็บใหม่" value={itemToEdit.newTabName || ''} onChange={(e) => setItemToEdit({...itemToEdit, newTabName: e.target.value})} className="w-1/2 bg-white border border-blue-400 rounded-lg px-3 py-2 text-sm focus:outline-none" />
                        )}
                      </div>
                    </div>
                    <div><label className="block text-xs font-medium text-gray-500 mb-1">คำอธิบาย</label><textarea value={itemToEdit.Description || ''} onChange={(e) => setItemToEdit({...itemToEdit, Description: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm h-[60px] resize-none focus:outline-none" /></div>
                    <div><label className="block text-xs font-medium text-gray-500 mb-1">ลิ้งก์ที่เกี่ยวข้อง</label><input type="url" value={itemToEdit.Link || ''} onChange={(e) => setItemToEdit({...itemToEdit, Link: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none" /></div>
                    <div className="pt-4 flex gap-3">
                       <button type="button" onClick={() => setItemToEdit(null)} disabled={isProcessing} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-xl py-3 text-sm font-medium transition-colors">ยกเลิก</button>
                       <button type="submit" disabled={isProcessing} className="flex-1 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white rounded-xl py-3 text-sm font-medium flex items-center justify-center gap-2">
                         {isProcessing ? <IconLoader2 size={16} className="animate-spin" /> : <IconSave size={16} />} บันทึก
                       </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* Image Detail Modal (Public View) */}
          {selectedImage && (
            <div className="fixed inset-0 z-50 bg-white/95 blur-backdrop flex items-center justify-center p-4 md:p-8 animate-fade-in">
              <button onClick={() => setSelectedImage(null)} className="absolute top-6 right-6 p-2 bg-gray-100 hover:bg-gray-200 rounded-full transition-colors z-10"><IconX size={24} /></button>
              <div className="max-w-6xl w-full max-h-full flex flex-col md:flex-row gap-8 overflow-y-auto hidden-scrollbar">
                <div className="w-full md:w-2/3 h-[50vh] md:h-[80vh] rounded-3xl overflow-hidden bg-gray-50 flex items-center justify-center border border-gray-100 shadow-sm">
                  <img src={selectedImage.DriveFileUrl} alt={selectedImage.ImageName} className="max-w-full max-h-full object-contain" />
                </div>
                <div className="w-full md:w-1/3 py-4 md:py-12 flex flex-col justify-center">
                  <span className="inline-block px-3 py-1 bg-gray-100 text-gray-600 text-xs font-semibold rounded-full mb-6 w-max">{selectedImage.TabName}</span>
                  <h2 className="text-4xl font-bold mb-4 tracking-tight">{selectedImage.ImageName}</h2>
                  <p className="text-gray-600 leading-relaxed mb-8 text-lg">{selectedImage.Description || 'ไม่มีคำอธิบาย'}</p>
                  {selectedImage.Link && (
                    <a href={selectedImage.Link.startsWith('http') ? selectedImage.Link : `https://${selectedImage.Link}`} target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center bg-gray-900 hover:bg-gray-800 text-white px-6 py-3 rounded-full w-max text-sm font-medium transition-colors">
                      เปิดลิ้งก์ที่เกี่ยวข้อง
                    </a>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
